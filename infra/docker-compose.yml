version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../:/app
    command: bash -lc "pip install -r backend/requirements.txt && uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  ui:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - ../:/app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
